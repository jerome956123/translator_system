<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雙語口譯系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #0f172a;
            color: #e2e8f0;
            font-family: 'Noto Sans TC', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .mic-wave { display: inline-block; position: relative; }
        .mic-wave::after {
            content: ''; position: absolute; top: 50%; left: 50%;
            width: 100%; height: 100%; border-radius: 50%;
            background-color: rgba(59, 130, 246, 0.5);
            transform: translate(-50%, -50%) scale(1);
            animation: wave 1.5s infinite; z-index: -1;
        }
        @keyframes wave {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
            100% { transform: translate(-50%, -50%) scale(2.5); opacity: 0; }
        }
        .message-enter { animation: slideIn 0.3s ease-out forwards; }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // 指定使用最新的正式版極速模型
        const MODEL_NAME = "gemini-1.5-flash"; 

        function App() {
            // --- API Key 管理系統 ---
            const [apiKey, setApiKey] = useState(localStorage.getItem('gemini_api_key') || '');
            const [inputKey, setInputKey] = useState('');
            const [isConfigured, setIsConfigured] = useState(!!localStorage.getItem('gemini_api_key'));

            const saveApiKey = () => {
                if (inputKey.trim()) {
                    localStorage.setItem('gemini_api_key', inputKey.trim());
                    setApiKey(inputKey.trim());
                    setIsConfigured(true);
                } else {
                    alert("請輸入有效的 API Key");
                }
            };

            const resetApiKey = () => {
                if(confirm("確定要清除記憶的 API Key 嗎？")) {
                    localStorage.removeItem('gemini_api_key');
                    setApiKey('');
                    setInputKey('');
                    setIsConfigured(false);
                }
            };

            // --- 原始系統狀態 ---
            const [messages, setMessages] = useState([]);
            const [appMode, setAppMode] = useState('stream'); 
            const [isPushToTalk, setIsPushToTalk] = useState(false);
            const [isListening, setIsListening] = useState(false);
            const [isRecording, setIsRecording] = useState(false);
            const [speakingId, setSpeakingId] = useState(null); 
            const [activeMode, setActiveMode] = useState(null);
            const [interimText, setInterimText] = useState("");
            const [voices, setVoices] = useState([]);

            const recognitionRef = useRef(null);
            const mediaRecorderRef = useRef(null);
            const messagesEndRef = useRef(null);

            useEffect(() => {
                messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
            }, [messages, interimText]);

            useEffect(() => {
                const loadVoices = () => {
                    const availableVoices = window.speechSynthesis.getVoices();
                    if (availableVoices.length > 0) setVoices(availableVoices);
                };
                loadVoices();
                if (window.speechSynthesis.onvoiceschanged !== undefined) {
                    window.speechSynthesis.onvoiceschanged = loadVoices;
                }
            }, []);

            const speakText = (text, lang, id) => {
                if (!('speechSynthesis' in window)) return;
                window.speechSynthesis.cancel();
                setSpeakingId(null);
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = lang; 
                utterance.rate = 1.0; 
                if (voices.length > 0) {
                    let targetVoice = voices.find(v => v.lang === lang) || voices.find(v => v.lang.startsWith(lang.split('-')[0]));
                    if (targetVoice) utterance.voice = targetVoice;
                }
                utterance.onstart = () => setSpeakingId(id);
                utterance.onend = () => setSpeakingId(null);
                utterance.onerror = () => setSpeakingId(null);
                window.speechSynthesis.speak(utterance);
            };

            const blobToBase64 = (blob) => {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        if (typeof reader.result === 'string') resolve(reader.result.split(',')[1]);
                        else reject(new Error("Failed to convert blob to base64"));
                    };
                    reader.readAsDataURL(blob);
                });
            };

            const translateTextWithGemini = async (text, sourceLang) => {
                const targetLang = sourceLang === 'zh' ? 'Japanese' : 'Traditional Chinese';
                const sourceLangName = sourceLang === 'zh' ? 'Traditional Chinese' : 'Japanese';
                const systemPrompt = `You are a professional real-time interpreter. Translate the following ${sourceLangName} text to ${targetLang}. Output ONLY the translated text. No explanations.`;

                const delays = [1000, 2000, 4000, 8000];
                for (let attempt = 0; attempt <= 4; attempt++) {
                    try {
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ contents: [{ parts: [{ text: `${systemPrompt}\n\nOriginal Text: "${text}"` }] }] })
                        });
                        const data = await response.json();
                        if (data.error) throw new Error(data.error.message);
                        return data.candidates?.[0]?.content?.parts?.[0]?.text?.trim() || "[翻譯失敗]";
                    } catch (error) {
                        if (attempt < 4) await new Promise(resolve => setTimeout(resolve, delays[attempt]));
                        else return "[連線錯誤，請檢查金鑰或網路]";
                    }
                }
            };

            const processAudioWithGemini = async (audioBase64, mode, messageId) => {
                const sourceLang = mode === 'user' ? 'Mandarin Chinese' : 'Japanese';
                const targetLang = mode === 'user' ? 'Japanese' : 'Traditional Chinese';
                const transcribeInstruction = mode === 'user' ? "Transcribe exactly in Traditional Chinese (繁體中文)." : "Transcribe exactly.";
                const systemPrompt = `You are a simultaneous interpreter.\n1. Listen to the audio (${sourceLang}).\n2. ${transcribeInstruction}\n3. Translate to ${targetLang}.\nOutput strictly in JSON:\n{"transcription": "original", "translation": "translated"}`;

                const delays = [1000, 2000, 4000, 8000];
                for (let attempt = 0; attempt <= 4; attempt++) {
                    try {
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: systemPrompt }, { inlineData: { mimeType: "audio/webm", data: audioBase64 } }] }],
                                generationConfig: { responseMimeType: "application/json" }
                            })
                        });
                        const data = await response.json();
                        if (data.error) throw new Error(data.error.message);
                        const result = JSON.parse(data.candidates?.[0]?.content?.parts?.[0]?.text);
                        return { original: result.transcription || "[無法辨識]", translation: result.translation || "[翻譯失敗]" };
                    } catch (error) {
                        if (attempt < 4) await new Promise(resolve => setTimeout(resolve, delays[attempt]));
                        else return { original: "[連線錯誤]", translation: "請檢查金鑰或網路狀態" };
                    }
                }
            };

            const startListeningStream = (mode) => {
                if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                    alert("您的瀏覽器不支援 Web Speech API。"); return;
                }
                if (recognitionRef.current) recognitionRef.current.stop();
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                const recognition = new SpeechRecognition();
                recognition.lang = mode === 'user' ? 'cmn-Hant-TW' : 'ja-JP';
                recognition.continuous = true;
                recognition.interimResults = true;

                recognition.onstart = () => { setIsListening(true); setActiveMode(mode); };
                recognition.onerror = (e) => { if (e.error === 'not-allowed') { stopAll(); alert("請允許麥克風權限"); } };
                recognition.onend = () => {
                    if (isListening && !isPushToTalk) {
                        setTimeout(() => {
                            if (activeMode === mode && isListening && appMode === 'stream') {
                                try { recognition.start(); } catch(e) { stopAll(); }
                            }
                        }, 500);
                    } else {
                        setIsListening(false); setActiveMode(null);
                    }
                };

                recognition.onresult = async (event) => {
                    let finalTranscript = ''; let interimTranscript = '';
                    for (let i = event.resultIndex; i < event.results.length; ++i) {
                        if (event.results[i].isFinal) finalTranscript += event.results[i][0].transcript;
                        else interimTranscript += event.results[i][0].transcript;
                    }
                    setInterimText(interimTranscript);

                    if (finalTranscript) {
                        const newMsgId = Date.now();
                        const sender = mode === 'user' ? 'me' : 'partner';
                        setMessages(prev => [...prev, { id: newMsgId, text: finalTranscript, translation: "翻譯中...", sender: sender, loading: true, mode: 'stream' }]);
                        const translation = await translateTextWithGemini(finalTranscript, mode === 'user' ? 'zh' : 'ja');
                        setMessages(prev => prev.map(msg => msg.id === newMsgId ? { ...msg, translation: translation, loading: false } : msg));
                        setInterimText("");
                    }
                };
                recognitionRef.current = recognition;
                recognition.start();
            };

            const startRecordingAudio = async (mode) => {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    const mediaRecorder = new MediaRecorder(stream);
                    let localChunks = [];
                    mediaRecorderRef.current = mediaRecorder;

                    mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) localChunks.push(e.data); };
                    mediaRecorder.onstart = () => { setIsRecording(true); setActiveMode(mode); };
                    mediaRecorder.onstop = async () => {
                        setIsRecording(false); setActiveMode(null);
                        stream.getTracks().forEach(track => track.stop());
                        if (localChunks.length === 0) return;

                        const tempMsgId = Date.now();
                        const sender = mode === 'user' ? 'me' : 'partner';
                        setMessages(prev => [...prev, { id: tempMsgId, text: "音訊上傳處理中...", translation: "Gemini 聽打翻譯中...", sender: sender, loading: true, mode: 'record' }]);
                        
                        try {
                            const audioBlob = new Blob(localChunks, { type: 'audio/webm' });
                            const base64Audio = await blobToBase64(audioBlob);
                            const result = await processAudioWithGemini(base64Audio, mode, tempMsgId);
                            setMessages(prev => prev.map(msg => msg.id === tempMsgId ? { ...msg, text: result.original, translation: result.translation, loading: false } : msg));
                        } catch (e) {
                            setMessages(prev => prev.map(msg => msg.id === tempMsgId ? { ...msg, text: "錯誤", translation: "音訊處理失敗", loading: false } : msg));
                        }
                    };
                    mediaRecorder.start();
                } catch (err) { alert("無法存取麥克風，請檢查權限。"); }
            };

            const stopAll = () => {
                setIsListening(false); setIsRecording(false);
                if (recognitionRef.current) recognitionRef.current.stop();
                if (mediaRecorderRef.current && mediaRecorderRef.current.state !== 'inactive') mediaRecorderRef.current.stop();
                else setActiveMode(null);
                setInterimText(""); window.speechSynthesis.cancel();
            };

            const handleModeButtonPress = (mode) => {
                if (activeMode === mode) { stopAll(); return; }
                if (activeMode !== null) {
                    stopAll();
                    setTimeout(() => { appMode === 'stream' ? startListeningStream(mode) : startRecordingAudio(mode); }, 200);
                    return;
                }
                appMode === 'stream' ? startListeningStream(mode) : startRecordingAudio(mode);
            };

            const handlePTTStart = (mode) => {
                if (activeMode) return;
                appMode === 'stream' ? startListeningStream(mode) : startRecordingAudio(mode);
            };

            const getButtonEvents = (mode) => {
                if (isPushToTalk) return {
                    onMouseDown: () => handlePTTStart(mode), onMouseUp: stopAll, onMouseLeave: stopAll,
                    onTouchStart: (e) => { e.preventDefault(); handlePTTStart(mode); },
                    onTouchEnd: (e) => { e.preventDefault(); stopAll(); }
                };
                return { onClick: () => handleModeButtonPress(mode) };
            };

            // --- 畫面渲染區塊 ---

            // 如果還沒設定 API Key，顯示設定畫面
            if (!isConfigured) {
                return (
                    <div className="flex flex-col h-screen max-w-md mx-auto bg-slate-900 border-x border-slate-800 shadow-2xl overflow-hidden justify-center items-center p-8 text-slate-200">
                        <i className="fa-solid fa-key text-6xl text-blue-500 mb-6 drop-shadow-[0_0_15px_rgba(59,130,246,0.5)]"></i>
                        <h2 className="text-2xl font-bold mb-3 text-white">啟動系統</h2>
                        <p className="text-sm text-slate-400 text-center mb-8 leading-relaxed">
                            請輸入您的 Google Gemini API Key。<br/>金鑰將安全地記憶在此設備的瀏覽器中，離開網頁不會遺失。
                        </p>
                        <input 
                            type="password" 
                            className="w-full p-4 rounded-xl bg-slate-800 border border-slate-600 text-white mb-6 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 shadow-inner"
                            placeholder="AIzaSy..."
                            value={inputKey}
                            onChange={(e) => setInputKey(e.target.value)}
                        />
                        <button 
                            onClick={saveApiKey}
                            className="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 px-4 rounded-xl transition-colors shadow-lg"
                        >
                            連線並開始使用
                        </button>
                    </div>
                );
            }

            // 正式主畫面
            return (
                <div className="flex flex-col h-screen max-w-md mx-auto bg-slate-900 border-x border-slate-800 shadow-2xl overflow-hidden relative">
                    <header className="bg-slate-800 p-4 shadow-md z-10 flex justify-between items-center border-b border-slate-700 relative">
                        <div className="flex items-center gap-2">
                            <i className="fa-solid fa-language text-blue-400 text-xl"></i>
                            <h1 className="font-bold text-lg text-white whitespace-nowrap">雙語口譯</h1>
                            <span className="text-[10px] bg-slate-700/50 text-slate-300 px-2 py-0.5 rounded-full border border-slate-600 ml-1">
                                {MODEL_NAME}
                            </span>
                        </div>
                        <button onClick={resetApiKey} className="text-slate-500 hover:text-slate-300 text-sm" title="重設 API Key">
                            <i className="fa-solid fa-gear"></i>
                        </button>
                    </header>

                    <div className="flex-1 overflow-y-auto p-4 space-y-4 bg-slate-900">
                        {messages.length === 0 && !interimText && (
                            <div className="h-full flex flex-col items-center justify-center text-slate-600 space-y-4 opacity-50">
                                <i className={`fa-solid ${appMode === 'stream' ? 'fa-bolt' : 'fa-microphone-lines'} text-6xl mb-2`}></i>
                                <p>目前模式：{appMode === 'stream' ? '即時口譯' : '精準錄音'}</p>
                                <p className="text-sm">{isPushToTalk ? '按住下方按鈕開始對話' : '點擊下方按鈕開始對話'}</p>
                            </div>
                        )}
                        {messages.map((msg) => (
                            <div key={msg.id} className={`flex flex-col ${msg.sender === 'me' ? 'items-end' : 'items-start'} message-enter`}>
                                <div className={`max-w-[85%] rounded-2xl p-4 shadow-lg border relative ${msg.sender === 'me' ? 'bg-blue-600/20 border-blue-500/30 text-blue-100 rounded-br-none' : 'bg-emerald-600/20 border-emerald-500/30 text-emerald-100 rounded-bl-none'}`}>
                                    <span className="absolute top-2 right-2 text-[10px] opacity-40 uppercase tracking-wider border border-white/20 px-1 rounded">{msg.mode === 'stream' ? 'Live' : 'Audio'}</span>
                                    <p className="text-sm opacity-70 mb-1 font-light">{msg.sender === 'me' ? '我 (中文)' : '對方 (日文)'}</p>
                                    {msg.loading && msg.mode === 'record' ? (
                                        <div className="flex items-center gap-2 mb-2 text-slate-300"><i className="fa-solid fa-circle-notch fa-spin"></i><span className="text-lg italic opacity-70">音訊上傳處理中...</span></div>
                                    ) : (<p className="text-lg mb-2 leading-snug">{msg.text}</p>)}
                                    <div className={`h-px w-full my-2 ${msg.sender === 'me' ? 'bg-blue-500/30' : 'bg-emerald-500/30'}`}></div>
                                    <div className="flex items-start gap-3 justify-between">
                                        <div className="flex items-start gap-2 flex-1">
                                            <i className={`fa-solid fa-language mt-1 text-xs ${msg.loading ? 'animate-pulse' : ''}`}></i>
                                            <p className={`font-bold text-xl tracking-wide ${msg.loading ? 'animate-pulse text-slate-400' : 'text-white'}`}>{msg.translation}</p>
                                        </div>
                                        {!msg.loading && (
                                            <button onClick={() => speakText(msg.translation, msg.sender === 'me' ? 'ja-JP' : 'zh-TW', msg.id)} className={`p-2 rounded-full transition-colors flex-shrink-0 mt-[-4px] ${speakingId === msg.id ? 'bg-white text-slate-900 animate-pulse' : 'text-white/40 hover:text-white hover:bg-white/10'}`}>
                                                <i className={`fa-solid ${speakingId === msg.id ? 'fa-volume-high' : 'fa-volume-low'}`}></i>
                                            </button>
                                        )}
                                    </div>
                                </div>
                            </div>
                        ))}
                        {interimText && (
                             <div className={`flex flex-col ${activeMode === 'user' ? 'items-end' : 'items-start'} opacity-70`}>
                                <div className="max-w-[85%] rounded-2xl p-4 border border-dashed border-slate-500 bg-slate-800/50">
                                    <p className="text-sm text-slate-400 mb-1">正在聆聽...</p><p className="text-lg text-white animate-pulse">{interimText}</p>
                                </div>
                             </div>
                        )}
                        <div ref={messagesEndRef} />
                    </div>

                    <div className="bg-slate-800 p-4 border-t border-slate-700 safe-area-bottom">
                        <div className="flex justify-between items-center mb-4 px-2">
                            <div className="bg-slate-900 p-1 rounded-lg inline-flex relative">
                                <div className="absolute bg-slate-700 rounded-md transition-all duration-300 ease-out h-[calc(100%-8px)] top-1" style={{width: 'calc(50% - 4px)', left: appMode === 'stream' ? '4px' : 'calc(50%)'}}></div>
                                <button onClick={() => {stopAll(); setAppMode('stream');}} className={`relative z-10 px-4 py-2 text-xs font-medium transition-colors rounded-md flex items-center gap-1 ${appMode === 'stream' ? 'text-white' : 'text-slate-400'}`}><i className="fa-solid fa-bolt"></i>即時</button>
                                <button onClick={() => {stopAll(); setAppMode('record');}} className={`relative z-10 px-4 py-2 text-xs font-medium transition-colors rounded-md flex items-center gap-1 ${appMode === 'record' ? 'text-white' : 'text-slate-400'}`}><i className="fa-solid fa-microphone-lines"></i>錄音</button>
                            </div>
                             <div className="flex items-center">
                                <span className={`text-xs mr-2 font-medium ${isPushToTalk ? 'text-blue-400' : 'text-slate-500'}`}>{isPushToTalk ? '按住說話' : '點擊切換'}</span>
                                <div className={`w-12 h-6 rounded-full p-1 cursor-pointer transition-colors duration-300 flex items-center ${isPushToTalk ? 'bg-blue-600' : 'bg-slate-600'}`} onClick={() => setIsPushToTalk(!isPushToTalk)}>
                                    <div className={`bg-white w-4 h-4 rounded-full shadow-md transform transition-transform duration-300 ${isPushToTalk ? 'translate-x-6' : 'translate-x-0'}`}></div>
                                </div>
                            </div>
                        </div>

                        <div className="grid grid-cols-2 gap-4">
                            <button {...getButtonEvents('user')} disabled={activeMode === 'partner'} className={`relative overflow-hidden rounded-xl p-4 flex flex-col items-center justify-center transition-all duration-100 select-none ${activeMode === 'user' ? (appMode === 'stream' ? 'bg-blue-600 shadow-[0_0_15px_rgba(37,99,235,0.6)] scale-95' : 'bg-red-500 animate-pulse scale-95') : activeMode === 'partner' ? 'bg-slate-700 opacity-30 cursor-not-allowed' : 'bg-slate-700 hover:bg-slate-600 text-slate-200 active:bg-slate-600'} text-white touch-none`}>
                                <div className={`text-2xl mb-2 ${activeMode === 'user' && appMode === 'stream' ? 'mic-wave' : ''}`}><i className={`fa-solid ${activeMode === 'user' && appMode === 'record' ? 'fa-stop' : 'fa-microphone'}`}></i></div>
                                <span className="font-bold text-sm flex flex-col items-center leading-tight">{activeMode === 'user' && appMode === 'record' ? (isPushToTalk ? '放開傳送' : '停止並傳送') : (isPushToTalk ? <><span className="text-base mb-1">中文</span><span className="text-[10px] font-normal opacity-80">(按住說話)</span></> : '中文')}</span>
                            </button>
                            <button {...getButtonEvents('partner')} disabled={activeMode === 'user'} className={`relative overflow-hidden rounded-xl p-4 flex flex-col items-center justify-center transition-all duration-100 select-none ${activeMode === 'partner' ? (appMode === 'stream' ? 'bg-emerald-600 shadow-[0_0_15px_rgba(5,150,105,0.6)] scale-95' : 'bg-red-500 animate-pulse scale-95') : activeMode === 'user' ? 'bg-slate-700 opacity-30 cursor-not-allowed' : 'bg-slate-700 hover:bg-slate-600 text-slate-200 active:bg-slate-600'} text-white touch-none`}>
                                <div className={`text-2xl mb-2 ${activeMode === 'partner' && appMode === 'stream' ? 'mic-wave' : ''}`}><i className={`fa-solid ${activeMode === 'partner' && appMode === 'record' ? 'fa-stop' : 'fa-ear-listen'}`}></i></div>
                                <span className="font-bold text-sm flex flex-col items-center leading-tight">{activeMode === 'partner' && appMode === 'record' ? (isPushToTalk ? '放開傳送' : '停止並傳送') : (isPushToTalk ? <><span className="text-base mb-1">日本語</span><span className="text-[10px] font-normal opacity-80">(長押しで話す)</span></> : '日本語')}</span>
                            </button>
                        </div>
                        
                        <div className="text-center mt-3 h-5">
                            <p className="text-xs text-slate-400">{activeMode ? (appMode === 'record' ? "正在錄音..." : "正在聆聽中...") : (isPushToTalk ? "按住上方按鈕開始" : "點擊上方按鈕開始")}</p>
                        </div>
                        <div className="flex justify-center mt-2">
                            {messages.length > 0 && (
                                <button onClick={() => {if(confirm("確定清除紀錄？")) setMessages([]);}} className="text-xs text-slate-500 hover:text-red-400 transition flex items-center gap-1"><i className="fa-solid fa-trash"></i> 清除紀錄</button>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
